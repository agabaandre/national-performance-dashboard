# Apache VirtualHost for CodeIgniter + PHP 8.2 FPM
# Copy into your site config (e.g. /etc/apache2/sites-available/your-site.conf)
# then: sudo a2enmod proxy_fcgi rewrite && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName example.com

    # Point to project root (where index.php lives)
    DocumentRoot "/var/www/national-performance-dashboard"

    # Or use public/ as document root:
    # DocumentRoot "/var/www/national-performance-dashboard/public"

    <Directory "/var/www/national-performance-dashboard">
        Options -Indexes -MultiViews +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # --- PHP 8.2 FPM (required) ---
    # Find your socket: ls /run/php/ /var/run/php/
    <IfModule proxy_fcgi_module>
        # Do NOT use ProxyPassMatch with PATH_INFO — it causes "No input file specified"
        # BAD:  ProxyPassMatch ^/(.*\.php)(/.*)?$ unix:...|fcgi://localhost/var/www/.../$1$2

        ProxyFCGIBackendType GENERIC

        <FilesMatch \.php$>
            SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost/"
        </FilesMatch>
    </IfModule>

    # Block PATH_INFO on front controller
    <Files "index.php">
        AcceptPathInfo Off
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/national-performance-dashboard-error.log
    CustomLog ${APACHE_LOG_DIR}/national-performance-dashboard-access.log combined
</VirtualHost>
