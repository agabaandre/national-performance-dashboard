# Nginx site config for CodeIgniter (PHP 8.2+ / PHP-FPM)
# Set root to the directory that contains index.php (project root OR public/)

server {
    listen 80;
    server_name example.com;

    # Option A: document root at project root (index.php in root)
    root /var/www/national-performance-dashboard;

    # Option B (recommended): document root at public/
    # root /var/www/national-performance-dashboard/public;

    index index.php;
    client_max_body_size 50M;

    # Required when using public/ as document root (assets live outside public/)
    # location /assets/ {
    #     alias /var/www/national-performance-dashboard/assets/;
    # }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO "";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
