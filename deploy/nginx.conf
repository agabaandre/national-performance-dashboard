# Nginx site config for CodeIgniter (PHP 8.2+ / PHP-FPM)
# Point root to the project directory containing index.php

server {
    listen 80;
    server_name example.com;
    root /var/www/national-performance-dashboard;
    index index.php;

    location / {
        try_files $uri $uri/ @ci;
    }

    location @ci {
        rewrite ^/(.*)$ /index.php?/$1 last;
    }

    location ~ ^/index\.php {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
